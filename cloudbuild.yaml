steps:
  # Build the image, tagged with the commit SHA and latest
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest
      - .

  # Push both tags to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}

  # Create or update the Cloud Run Job
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        if gcloud run jobs describe ${_JOB_NAME} \
            --region=${_REGION} --project=${PROJECT_ID} &>/dev/null; then
          gcloud run jobs update ${_JOB_NAME} \
            --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA} \
            --service-account=${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com \
            --set-env-vars=PROJECT_ID=${PROJECT_ID} \
            --region=${_REGION} \
            --project=${PROJECT_ID}
        else
          gcloud run jobs create ${_JOB_NAME} \
            --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA} \
            --service-account=${_SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com \
            --set-env-vars=PROJECT_ID=${PROJECT_ID} \
            --max-retries=2 \
            --task-timeout=300 \
            --region=${_REGION} \
            --project=${PROJECT_ID}
        fi

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

substitutions:
  _REGION: us-central1
  _REPO: ncc-monitor
  _IMAGE: ncc-spoke-monitor
  _JOB_NAME: ncc-spoke-monitor
  _SA_NAME: ncc-monitor-sa

options:
  logging: CLOUD_LOGGING_ONLY
